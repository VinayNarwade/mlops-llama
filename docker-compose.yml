# docker-compose.yml
services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # model weights persist between restarts
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: .
    container_name: llama-api
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy   # waits for Ollama to be ready
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data: